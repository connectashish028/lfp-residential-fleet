name: CI

# Runs on every push to the default branch and every pull request.
# Three gates: ruff (lint + import sort), mypy (static typing), pytest
# (76 logic + 6 atomic-write tests; the 9 Streamlit AppTest integration
# tests auto-skip in CI because the gold parquets aren't built — they
# require the Figgener dataset, which is gitignored).

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: lint · type-check · test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check src/ app/ tests/

      - name: Type-check (mypy)
        run: mypy src/bess_fleet

      - name: Run tests (pytest)
        run: pytest tests/ -v
